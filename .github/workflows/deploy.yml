name: Deploy v1

on:
  push:
    branches: [v1]

jobs:
  deploy-v1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build for /v1
        run: npm run build -- --base /v1/

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to /v1
        run: aws s3 sync dist/ s3://ribbon.obfusco.us/v1/ --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E1JO9PQKZGMYPQ --paths "/v1/*"
