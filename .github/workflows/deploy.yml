name: Deploy v3

on:
  push:
    branches: [v3, 'nmj/**']

jobs:
  deploy-v3:
    if: github.ref == 'refs/heads/v3'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build for root (v3 is now live at ribbon.obfusco.us)
        run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to root
        run: aws s3 sync dist/ s3://ribbon.obfusco.us/ --delete --exclude "v*/*"

      - name: Build for /v3
        run: npm run build -- --base /v3/

      - name: Deploy to /v3
        run: aws s3 sync dist/ s3://ribbon.obfusco.us/v3/ --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E1JO9PQKZGMYPQ --paths "/*"

  deploy-dev:
    if: startsWith(github.ref, 'refs/heads/nmj/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build for dev (base /)
        run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to dev S3
        run: aws s3 sync dist/ s3://ribbon-dev.obfusco.us/ --delete

      - name: Invalidate dev CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
