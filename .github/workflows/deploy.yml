name: Deploy to S3

# Each version branch auto-deploys its own path on push:
#   v1 → /v1/
#   v2 → /v2/
#   v3 → /v3/ + root /  (v3 is current stable at ribbon.obfusco.us)
# Push to main to force a full rebuild of all versions at once.

on:
  push:
    branches: [main, 'nmj/**']

jobs:
  deploy-prod:
    # Full rebuild: checks out each version branch and deploys all paths.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Checkout v1 branch
        run: git fetch origin refs/heads/v1 && git checkout FETCH_HEAD && npm ci

      - name: Build for /v1
        run: npm run build -- --base /v1/

      - name: Deploy to /v1
        run: aws s3 sync dist/ s3://ribbon.obfusco.us/v1/ --delete

      - name: Checkout v2 branch
        run: git fetch origin refs/heads/v2 && git checkout FETCH_HEAD && npm ci

      - name: Build for /v2
        run: npm run build -- --base /v2/

      - name: Deploy to /v2
        run: aws s3 sync dist/ s3://ribbon.obfusco.us/v2/ --delete

      - name: Checkout v3 branch (root + /v3)
        run: git fetch origin refs/heads/v3 && git checkout FETCH_HEAD && npm ci

      - name: Build for root (v3 is current stable)
        run: npm run build

      - name: Deploy to root
        run: aws s3 sync dist/ s3://ribbon.obfusco.us/ --delete --exclude "v*/*"

      - name: Build for /v3
        run: npm run build -- --base /v3/

      - name: Deploy to /v3
        run: aws s3 sync dist/ s3://ribbon.obfusco.us/v3/ --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E1JO9PQKZGMYPQ --paths "/*"

  deploy-dev:
    if: startsWith(github.ref, 'refs/heads/nmj/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build for dev (base /)
        run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to dev S3
        run: aws s3 sync dist/ s3://ribbon-dev.obfusco.us/ --delete

      - name: Invalidate dev CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
