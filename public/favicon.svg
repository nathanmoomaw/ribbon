<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#ff6ec7"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="#0a0a1a"/>
  <!-- Glow aura -->
  <path d="M 12,32 C 12,14 24,12 32,32 C 38,52 50,50 50,32 C 50,14 38,12 32,32 C 24,52 12,50 12,32 Z"
    fill="none" stroke="url(#g)" stroke-width="6" stroke-linecap="round" opacity="0.2" filter="url(#glow)"/>
  <!-- Under strand -->
  <path d="M 50,32 C 50,14 38,12 32,32 C 24,52 12,50 12,32"
    fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <!-- Bridge -->
  <ellipse cx="32" cy="32" rx="4" ry="3" fill="#0a0a1a"/>
  <!-- Over strand -->
  <path d="M 12,32 C 12,14 24,12 32,32 C 38,52 50,50 50,32"
    fill="none" stroke="url(#g)" stroke-width="4" stroke-linecap="round"/>
</svg>
